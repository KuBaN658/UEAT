- id: t10_mm35
  title: Сложные сценарии встречи (неодновременный старт)
  text: |-
    Если один стартует на $\Delta t$ позже: за время $\Delta t$ первый проехал $v_1 \Delta t$. Оставшееся расстояние $= S - v_1 \Delta t$ они сближают со скоростью $v_1+v_2$. Время до встречи (от старта второго): $\frac{S - v_1 \Delta t}{v_1+v_2}$.
