- id: t10_mm36
  title: 'Относительное движение: поезда, колонны'
  text: |-
    Поезд длиной $L$ проезжает мимо столба за $t$: $v = L/t$. Два поезда длиной $L_1, L_2$ навстречу: проезжают мимо друг друга за $\frac{L_1+L_2}{v_1+v_2}$. При обгоне в одну сторону: $\frac{L_1+L_2}{v_1-v_2}$ (при $v_1>v_2$).
