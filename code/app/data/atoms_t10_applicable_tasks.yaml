- id: t10_mm13
  title: Квадратные уравнения из текстовых задач
  text: |-
    После умножения на общий знаменатель или раскрытия скобок часто получается $ax^2+bx+c=0$. Дискриминант $D=b^2-4ac$; корни $x=\frac{-b\pm\sqrt{D}}{2a}$. Из двух корней выбирай тот, который удовлетворяет ОДЗ: скорость>0, время>0, масса>0.
