- id: t10_mm21
  title: Задачи на догоняние с разными скоростями
  text: |-
    Один стартует раньше или начальный разрыв $d$. Догоняющий быстрее на $\Delta v$. Время догона: $t = \frac{d}{\Delta v}$. Если стартовали одновременно из одной точки, но с разных моментов — учти время «форы»: $v_1(t+\Delta t) = v_2 t$.
  task_number: 10
  subtypes:
