- id: t10_mm88
  title: 'Геометрическая прогрессия: формулы'
  text: |-
    ГП: $b_n = b_1 q^{n-1}$, $S_n = b_1 \frac{q^n-1}{q-1}$ (при $q\neq 1$). Свойство: $b_n^2 = b_{n-1} \cdot b_{n+1}$. «Каждый месяц увеличивается в $q$ раз» — это геометрическая прогрессия.
