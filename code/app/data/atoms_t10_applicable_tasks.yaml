- id: t10_mm33
  title: 'Встреча на маршруте: определение точки встречи'
  text: |-
    Навстречу из $A$ и $B$: $s_A = v_A t$, $s_B = v_B t$. Встреча когда $s_A + s_B = S_{AB}$. Расстояние от $A$ до точки встречи: $d_A = v_A \cdot \frac{S_{AB}}{v_A + v_B}$. Если нужна точка, а не время — подставь $t$ обратно.
  task_number: 10
  subtypes:
