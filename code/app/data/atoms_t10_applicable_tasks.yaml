  title: Текстовые задачи на арифметическую прогрессию
  text: |-
    Пример: «каждый день делал на $d$ деталей больше». Первый день: $a_1$, $n$-й: $a_1+(n-1)d$. Всего за $n$ дней: $S_n = \frac{n(2a_1+(n-1)d)}{2}$. Внимание: «в первый день 10, каждый следующий на 2 больше» → $a_1=10$, $d=2$.
