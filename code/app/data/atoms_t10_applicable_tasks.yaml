- id: t10_mm46
  title: 'Движение по кругу: встречи и обгоны'
  text: |-
    Навстречу по кольцу длиной $L$: встречаются каждые $\frac{L}{v_1+v_2}$ часов. В одну сторону: быстрый обгоняет медленного каждые $\frac{L}{v_1-v_2}$ часов. За $n$-ю встречу суммарное пройденное расстояние $= nL$.
