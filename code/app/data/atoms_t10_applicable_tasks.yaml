- id: t10_mm20
  title: Встречное движение
  text: |-
    При встречном движении скорость сближения $= v_1 + v_2$. Время до встречи: $t = \frac{S}{v_1 + v_2}$, где $S$ — начальное расстояние. Каждый проходит свою часть: $s_1 = v_1 t$, $s_2 = v_2 t$, и $s_1 + s_2 = S$.
