  title: Текстовые задачи на геометрическую прогрессию
  text: |-
    Пример: «вклад растёт на $10\%$ в год» → $q = 1.1$, через $n$ лет: $S = S_0 \cdot 1.1^n$. «Каждый час количество удваивается» → $q=2$. Осторожно с формулировкой: «через 3 года» означает $n=3$, т.е. $b_4 = b_1 q^3$.
