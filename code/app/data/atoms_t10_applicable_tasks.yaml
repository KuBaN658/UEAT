- id: t10_mm86
  title: 'Арифметическая прогрессия: формулы'
  text: |-
    АП: $a_n = a_1 + (n-1)d$, $S_n = \frac{n(a_1+a_n)}{2} = \frac{n(2a_1+(n-1)d)}{2}$. Свойство: $a_n = \frac{a_{n-1}+a_{n+1}}{2}$. Типичные ошибки: забыть $(n-1)$ или перепутать $n$ и $n-1$.
  task_number: 10
  subtypes:
  - progression
  error_tags:
  - progression_wrong_formula
  applicable_tasks: []
