- id: t10_mm08
  title: Уравнение из условия «разность»
  text: |-
    Фраза «на $d$ единиц больше/меньше» сразу даёт $A - B = d$ или $B - A = d$. «На $d$ часов позже» → разность времён: $\frac{S}{v_1}-\frac{S}{v_2}=d$. Всегда проверяй знак: «быстрее» → время меньше → вычитай из большего.
