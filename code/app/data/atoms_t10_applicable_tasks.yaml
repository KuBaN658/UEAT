- id: t10_mm47
  title: 'Движение по окружности: базовые понятия'
  text: |-
    Объект движется по кольцевой трассе длиной $L$. За время $t$ проходит $vt$ и оказывается в позиции $vt \bmod L$ от старта. Период обхода: $T = L/v$. Через $T$ объект возвращается в стартовую точку.
  task_number: 10
  subtypes:
