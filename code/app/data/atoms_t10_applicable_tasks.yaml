- id: t10_mm49
  title: 'Часовые задачи: стрелки часов'
  text: |-
    Минутная стрелка: $360°/60$ мин $= 6°$/мин. Часовая: $360°/720$ мин $= 0.5°$/мин. Скорость сближения: $6 - 0.5 = 5.5°$/мин. Стрелки совпадают каждые $\frac{360}{5.5} \approx 65.45$ мин.
