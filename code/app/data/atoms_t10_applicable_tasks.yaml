- id: t10_mm32
  title: 'Графики движения: чтение и интерпретация'
  text: |-
    На графике $s(t)$: наклон — скорость, горизонтальный участок — стоянка. Крутой наклон = высокая скорость. Встреча = пересечение графиков двух объектов. Для графика $v(t)$: расстояние — площадь под графиком.
