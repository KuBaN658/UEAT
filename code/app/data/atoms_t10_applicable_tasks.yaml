  title: Преследование с форой по времени
  text: |-
    Первый выехал на $\Delta t$ раньше второго. За это время набрал фору $d = v_1 \cdot \Delta t$. Второй догоняет со скоростью $v_2 > v_1$. Время догона с момента старта второго: $\frac{d}{v_2-v_1}$. Место догона: $v_2 \cdot \frac{d}{v_2-v_1}$ от точки старта второго.
