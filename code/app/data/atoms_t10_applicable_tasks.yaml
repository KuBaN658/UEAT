- id: t10_mm34
  title: 'Задачи на точку встречи: базовые'
  text: |-
    Два объекта стартуют одновременно из точек $A$ и $B$ навстречу. Время встречи $= \frac{S}{v_1+v_2}$. За это время первый проехал $\frac{v_1 S}{v_1+v_2}$ от $A$. Ключевое: при одновременном старте время в пути одинаковое.
  task_number: 10
