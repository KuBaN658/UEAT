- id: t10_mm48
  title: Совместное движение по кольцевой трассе
  text: |-
    Два бегуна по кругу $L$: стартуют из одной точки. Если в одну сторону, первый обгонит через $\frac{L}{v_1-v_2}$. Навстречу — встретятся через $\frac{L}{v_1+v_2}$. Если стартуют из разных точек — учти начальный разрыв.
