- id: t10_mm12
  title: Линейные уравнения из текстовых задач
  text: |-
    Если в задаче одно неизвестное и нет дробей с $x$ в знаменателе, получится линейное уравнение $ax+b=c$. Приведи все величины к одним единицам перед составлением уравнения. Пример: «заплатили $x$ руб., получили сдачу $y$ руб.» → $x + y = S$.
