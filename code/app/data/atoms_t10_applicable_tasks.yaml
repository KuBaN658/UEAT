  text: |-
    Собственная скорость $v$, скорость течения $u$. По течению: $v+u$, против: $v-u$. Обязательно $v > u$, иначе плыть против течения невозможно. Время по течению: $t_1 = \frac{S}{v+u}$, против: $t_2 = \frac{S}{v-u}$.
