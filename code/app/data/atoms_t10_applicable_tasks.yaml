- id: t10_mm15
  title: Системы уравнений для задач на растворы
  text: |-
    Если в условии два разных смешивания (например, «всё смешали» и «смешали равные массы»), вводи $p_1,p_2$ как неизвестные концентрации и составляй систему. В равных массах: $\frac{p_1+p_2}{2}=p_{\text{ит}}$.
