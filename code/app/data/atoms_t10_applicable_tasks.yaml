- id: t10_mm10
  title: Сложные задачи на сплавы с несколькими неизвестными
  text: |-
    Когда в задаче два или три сплава с разными долями: введи $x$ = масса одного из них, вырази остальные массы через $x$ и условия. Составь баланс по каждому веществу. Если два вещества — получится система из двух уравнений.
  task_number: 10
