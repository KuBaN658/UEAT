- id: t10_mm19
  title: Два объекта в одном направлении
  text: |-
    Если оба едут в одну сторону, расстояние между ними меняется со скоростью $|v_1 - v_2|$. Более быстрый догоняет более медленного. Время догона: $t = \frac{\Delta s}{v_1 - v_2}$ (при $v_1 > v_2$). Если расстояние увеличивается — аналогично.
