- id: t10_mm01
  title: Процент как доля числа
  text: |-
    $r\%$ числа $N$ — это $\frac{r}{100}\cdot N$. Увеличить на $r\%$ означает умножить на $(1+\frac{r}{100})$, уменьшить — на $(1-\frac{r}{100})$. Процент всегда нужно переводить в десятичную дробь.
  task_number: 10
  subtypes:
  - percent_mixture
  error_tags:
  - percent_used_as_number
  shared_skills:
  - answer_plausibility
  applicable_tasks:
  - 6D1598
  - FD5B44
  - 6D55BD
  - ADEDE3
- id: t10_mm02
  title: Нахождение числа по его проценту
  text: |-
    Если $x$ составляет $r\%$ от числа $N$, то $N=\frac{x}{r/100}=\frac{100x}{r}$. Часто ошибаются с выбором базы: «$5\%$ от зарплаты» и «$5\%$ от всех расходов» — это разные $N$.
  task_number: 10
  subtypes:
  - percent_mixture
  error_tags:
  - percent_wrong_base
  prerequisites:
  - t10_mm05
  applicable_tasks:
  - 6D1598
  - FD5B44
  - 6D55BD
  - ADEDE3
- id: t10_mm03
  title: Концентрация раствора и доля вещества
  text: |-
    Концентрация $p$ — доля чистого вещества в растворе: $p=\frac{m_{\text{в-ва}}}{m_{\text{р-ра}}}$. Масса вещества $= p \cdot m$. При смешивании масса вещества сохраняется: $p_1 m_1 + p_2 m_2 = p_3 (m_1 + m_2)$. Итоговая концентрация всегда между $p_1$ и $p_2$.
  task_number: 10
  subtypes:
  - percent_mixture
  error_tags:
  - mixture_not_using_balance
  - mixture_percent_not_to_fraction
  prerequisites:
  - t10_mm01
  shared_skills:
  - answer_plausibility
  applicable_tasks:
  - FD5B44
  - 6D55BD
  - F2CCA3
  - ADEDE3
- id: t10_mm04
  title: Смешивание двух растворов разной концентрации
  text: |-
    При смешивании двух растворов массами $m_1,m_2$ с концентрациями $p_1,p_2$: $p_{\text{ит}}=\frac{p_1 m_1 + p_2 m_2}{m_1 + m_2}$. Если одна масса — чистое вещество ($p=1$) или чистый растворитель ($p=0$), подставляй соответственно.
  task_number: 10
  subtypes:
  - percent_mixture
  error_tags:
  - mixture_wrong_total_mass
  - mixture_not_using_balance
  prerequisites:
  - t10_mm05
  applicable_tasks:
  - FD5B44
  - 6D55BD
  - ADEDE3
- id: t10_mm05
  title: Последовательные изменения на проценты
  text: |-
    Два изменения подряд: умножай множители, не складывай проценты. Если цена выросла на $a\%$, потом упала на $b\%$: итог $= P(1+\frac{a}{100})(1-\frac{b}{100})$. Это НЕ равно $P(1+\frac{a-b}{100})$. Результат зависит от порядка.
  task_number: 10
  subtypes:
  - percent_mixture
  error_tags:
  - percent_chain_changes
  prerequisites:
  - t10_mm03
  applicable_tasks: []
- id: t10_mm06
  title: 'Сплавы: масса металла в сплаве'
  text: |-
    Сплав — та же смесь. Если сплав массой $m$ содержит $r\%$ меди, то масса меди $=\frac{r}{100}m$. При сплавлении двух кусков масса каждого металла складывается. Если добавили чистый металл ($100\%$), его масса идёт целиком.
  task_number: 10
  subtypes:
  - percent_mixture
  error_tags:
  - mixture_not_using_balance
  - mixture_percent_not_to_fraction
  prerequisites:
  - t10_mm01
  applicable_tasks:
