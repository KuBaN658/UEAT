  title: Средняя скорость многоучасткового маршрута
  text: |-
    Для $n$ участков: $v_{\text{ср}} = \frac{s_1+s_2+\ldots+s_n}{t_1+t_2+\ldots+t_n}$. Если даны расстояния и скорости: $t_i = s_i / v_i$. Если даны времена и скорости: $s_i = v_i t_i$. Сначала найди числитель и знаменатель отдельно.
