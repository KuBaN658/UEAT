  title: Движение по участкам с разными скоростями
  text: |-
    Маршрут из нескольких участков: $S = s_1 + s_2 + \ldots$, общее время $T = t_1 + t_2 + \ldots$ Для каждого участка: $t_i = \frac{s_i}{v_i}$. Если дано общее время и расстояние — уравнение: $\frac{s_1}{v_1} + \frac{S - s_1}{v_2} = T$.
