  title: Нахождение скорости течения из условий
  text: |-
    Даны: расстояние, собственная скорость, разность времён → найти $u$. Уравнение: $\frac{S}{v-u} - \frac{S}{v+u} = \Delta t$. Умножь на $(v-u)(v+u)$: $S(v+u) - S(v-u) = \Delta t (v^2-u^2)$, т.е. $2Su = \Delta t(v^2-u^2)$.
