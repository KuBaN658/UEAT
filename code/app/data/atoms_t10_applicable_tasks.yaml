  title: Движение по участкам с разворотом
  text: |-
    Если объект возвращается назад (туда-обратно), общее расстояние $= 2S$ (или $S_1 + S_2$). Время туда: $t_1 = S/v_1$, обратно: $t_2 = S/v_2$. Общее время: $T = t_1 + t_2 + t_{\text{стоянка}}$.
