- id: t10_mm24
  title: 'Средняя скорость: определение $v_{\text{ср}}=S/T$'
  text: |-
    Средняя скорость = общее расстояние / общее время. Это НЕ среднее арифметическое скоростей! Если проехал 100 км со скоростью 50, потом 100 км со скоростью 100: $v_{\text{ср}} = \frac{200}{2+1} = \frac{200}{3} \approx 66.7$, а не $75$.
