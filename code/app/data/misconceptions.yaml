# Misconception atoms for RAG retrieval. Human-authored error patterns.
# Each maps to one error_tag from atoms.py ERROR_TAGS.
- id: mc_river_swap_plus_minus
  title: Путаница формул по/против течения
  text: |
    Ученик путает v+u и v-u: использует v+u для движения против течения или v-u для движения по течению.
    По течению скорость $v+u$, против — $v-u$.
    Мнемоника: ПО течению = ПОмощь = ПОлюс (+).
  error_tag: river_swap_plus_minus
  task_number: 10
- id: mc_river_forgot_v_gt_u
  title: Не проверено ограничение v > u
  text: |
    Забываешь проверить, что собственная скорость катера больше скорости течения ($v > u$).
    Скорость течения не может быть больше или равна собственной скорости.
  error_tag: river_forgot_v_gt_u
  task_number: 10
- id: mc_work_added_times_instead_of_rates
  title: Складываешь времена вместо производительностей
  text: |
    Классическая ошибка: складывают t1+t2 вместо 1/t1+1/t2.
    Совместная работа: объём/время = сумма производительностей. Время = объём/(1/t1+1/t2).
  error_tag: work_added_times_instead_of_rates
  task_number: 10
- id: mc_work_wrong_rate_equation
  title: Неверно составлено уравнение совместной работы
  text: |
    Время взято как среднее арифметическое вместо формулы совместной работы.
    Или уравнение составлено неверно (не balance производительностей).
    Как исправить: производительность = объём/время. Вместе: $1/t_1 + 1/t_2 = 1/t_{\\text{совм}}$. Время совместной работы $t = 1/(1/t_1 + 1/t_2)$. Не $(t_1+t_2)/2$.
  error_tag: work_wrong_rate_equation
  task_number: 10
- id: mc_motion_wrong_relative_speed
  title: Ошибка со скоростью сближения или удаления
  text: |
    Неверно использована скорость сближения/удаления.
    Встречное движение: v1+v2. В одном направлении: |v1-v2|.
  error_tag: motion_wrong_relative_speed
  task_number: 10
- id: mc_motion_forgot_delay_or_stop
  title: Пропущена задержка старта или остановка
  text: |
    Похоже, не учтена задержка старта или остановка при подсчёте общего времени.
    Нужно добавлять время остановки к времени движения.
  error_tag: motion_forgot_delay_or_stop
  task_number: 10
- id: mc_motion_mixed_time_and_distance
  title: Путаница между временем и расстоянием
  text: |
    Путаешь время и расстояние в формулах. s=vt, v=s/t, t=s/v.
    В задачах по окружности перепутаны формулы встречи/обгона.
  error_tag: motion_mixed_time_and_distance
  task_number: 10
- id: mc_avg_speed_arithmetic_mean
  title: Средняя скорость как среднее арифметическое
  text: |
    Считаешь среднюю скорость как (v1+v2)/2 вместо $S_{\\text{общ}}/T_{\\text{общ}}$.
    Средняя скорость = общий путь / общее время.
  error_tag: avg_speed_arithmetic_mean
  task_number: 10
- id: mc_avg_speed_used_wrong_total_time
  title: Неверно найдено общее время или расстояние
  text: |
    Неправильно находишь общее время или общее расстояние для средней скорости.
    Как исправить: $v_{\\text{ср}} = S_{\\text{общ}} / T_{\\text{общ}}$. Сначала найди $T_{\\text{общ}} = t_1 + t_2$ (сумма времён на участках) и $S_{\\text{общ}} = s_1 + s_2$ (сумма расстояний). Не путай: если даны скорости и расстояния — время участка $t_i = s_i/v_i$.
  error_tag: avg_speed_used_wrong_total_time
  task_number: 10
- id: mc_percent_used_as_number
  title: Процент использован как число
  text: |
    Используешь процент как число, забывая делить на 100.
    r% от N = (r/100)*N.
  error_tag: percent_used_as_number
  task_number: 10
- id: mc_percent_wrong_base
  title: Неверная база для процента
  text: |
    Берёшь процент от неправильной базы.
    «5% от зарплаты» и «5% от расходов» — разные базы.
    Как исправить: внимательно читай условие — «от чего» берётся процент. База — это то, что стоит после «от». r% от N = (r/100)*N. Перепроверь, что N — именно та величина, от которой считается процент.
  error_tag: percent_wrong_base
  task_number: 10
- id: mc_percent_chain_changes
  title: Складываешь проценты вместо множителей
  text: |
    При последовательных изменениях складываешь проценты вместо умножения множителей.
    Два изменения: итог = P*(1+a/100)*(1-b/100), не P*(1+(a-b)/100).
  error_tag: percent_chain_changes
  task_number: 10
- id: mc_mixture_not_using_balance
  title: Не составлен баланс вещества при смешивании
  text: |
    Не составляешь баланс вещества для смеси/сплава.
    При смешивании масса вещества сохраняется: p1*m1 + p2*m2 = p3*(m1+m2).
  error_tag: mixture_not_using_balance
  task_number: 10
- id: mc_mixture_percent_not_to_fraction
  title: Проценты не переведены в доли
  text: |
    Забываешь перевести проценты в доли (делить на 100) при составлении уравнения.
  error_tag: mixture_percent_not_to_fraction
  task_number: 10
- id: mc_mixture_wrong_total_mass
  title: Ошибка с общей массой при смешивании
  text: |
    Ошибаешься с общей массой при смешивании.
    Итоговая концентрация всегда между p1 и p2.
    Как исправить: общая масса смеси $m_1 + m_2$. Масса вещества в первом растворе $p_1 m_1/100$, во втором $p_2 m_2/100$. Итоговая концентрация $p_3 = 100 \\cdot (p_1 m_1 + p_2 m_2) / (100(m_1+m_2))$. Проверь, что $p_3$ между $p_1$ и $p_2$.
  error_tag: mixture_wrong_total_mass
  task_number: 10
- id: mc_picked_wrong_variable
  title: Неудачный выбор переменной
  text: |
    Неудачно выбираешь переменную — уравнение получается сложнее, чем нужно.
    Удобнее обозначать ту величину, которую спрашивают.
  error_tag: picked_wrong_variable
  task_number: 10
- id: mc_lost_parentheses_or_sign
  title: Потеря скобок или знака
  text: |
    Теряешь скобки или знак при алгебраических преобразованиях.
    Вероятна алгебраическая ошибка знака/скобок.
  error_tag: lost_parentheses_or_sign
  task_number: 10
- id: mc_did_not_check_constraints
  title: Не проверены ограничения задачи
  text: |
    Не проверяешь ограничения: скорость > 0, время > 0, масса > 0.
    Ответ по времени/скорости получился неположительным и не проверен на смысл.
  error_tag: did_not_check_constraints
  task_number: 10
- id: mc_units_mismatch
  title: Несовпадение единиц измерения
  text: |
    Единицы измерения не совпадают (часы и минуты, км и м).
    Приведи все величины к одним единицам перед уравнением.
  error_tag: units_mismatch
  task_number: 10
- id: mc_progression_wrong_formula
  title: Неверная формула прогрессии
  text: |
    Путаешь формулы арифметической и геометрической прогрессий.
    Арифметическая: $a_n = a_1 + (n-1)d$, $S_n = n(a_1+a_n)/2$. Геометрическая: $b_n = b_1 q^{n-1}$, $S_n = b_1(q^n-1)/(q-1)$ при $q \\neq 1$. Ключевое: в арифметической — разность $d$, в геометрической — знаменатель $q$.
  error_tag: progression_wrong_formula
  task_number: 10
- id: mc_progression_off_by_one
  title: Ошибка на единицу в формуле прогрессии
  text: |
    Ошибаешься на единицу: $n$ вместо $n-1$ в формуле прогрессии.
    Вероятна ошибка в индексации.
  error_tag: progression_off_by_one
  task_number: 10
- id: mc_deriv_wrong_rule
  title: Неверно применено правило дифференцирования
  text: |
    Неверно берёшь производную. Ошибка в правиле степенной/иррациональной функции.
    $(x^n)' = nx^{n-1}$, степень уменьшается на 1.
  error_tag: deriv_wrong_rule
  task_number: 12
- id: mc_deriv_forgot_chain_rule
  title: Пропущено цепное правило
  text: |
    Пропускаешь цепное правило: забываешь умножить на производную внутренней функции.
    (f(g(x)))' = f'(g(x))*g'(x).
  error_tag: deriv_forgot_chain_rule
  task_number: 12
- id: mc_deriv_sign_error
  title: Потеря знака в производной
  text: |
    Теряешь знак минус в производной.
    $(cos x)' = -sin x$.
  error_tag: deriv_sign_error
  task_number: 12
- id: mc_critical_point_wrong_eq
  title: Неверно решено уравнение f'(x)=0
  text: |
    Неверно решаешь уравнение $f'(x)=0$ или составлено неверно.
    Как исправить: 1) правильно возьми производную; 2) приравняй к нулю; 3) вынеси общие множители или приведи к виду $ax^2+bx+c=0$; 4) проверь, что все корни входят в область определения (знаменатель $\\neq 0$, под корнем $\\geq 0$, под логарифмом $> 0$).
  error_tag: critical_point_wrong_eq
  task_number: 12
- id: mc_critical_point_missed_domain
  title: Не учтена область определения
  text: |
    Не учитываешь область определения (ln x при x>0, sqrt при x>=0).
    Не учтена область определения знаменателя.
  error_tag: critical_point_missed_domain
  task_number: 12
- id: mc_minmax_forgot_endpoints
  title: Не проверены концы отрезка
  text: |
    Забываешь проверить значения функции на концах отрезка.
    На [a,b] нужно проверить f(a), f(b) и все критические точки внутри.
  error_tag: minmax_forgot_endpoints
  task_number: 12
- id: mc_minmax_wrong_sign_analysis
  title: Неверный анализ знака производной
  text: |
    Ошибаешься в анализе знака производной на интервалах.
    f'>0 — возрастает, f'<0 — убывает.
  error_tag: minmax_wrong_sign_analysis
  task_number: 12
- id: mc_minmax_confused_min_max
  title: Перепутаны x и f(x)
  text: |
    Путаешь точку экстремума (значение x) и значение функции f(x).
    «Наибольшее значение» — это f(x), не x. «Точка максимума» — это x.
  error_tag: minmax_confused_min_max
  task_number: 12
- id: mc_trig_deriv_error
  title: Ошибка в производных sin/cos
  text: |
    Ошибаешься в производных sin/cos. Знак минус у косинуса!
    (sin x)'=cos x, (cos x)'=-sin x.
  error_tag: trig_deriv_error
  task_number: 12
- id: mc_log_deriv_error
  title: Ошибка в производной логарифма
  text: |
    Ошибаешься в производной логарифма.
    (ln x)'=1/x. Для ln(g(x)) используй цепное правило: (ln g)' = g'/g. Пример: (ln(x^2+1))' = 2x/(x^2+1).
  error_tag: log_deriv_error
  task_number: 12
- id: mc_exp_deriv_error
  title: Ошибка в производной экспоненты
  text: |
    Ошибаешься в производной экспоненты. (e^x)'=e^x, (a^x)'=a^x*ln(a).
  error_tag: exp_deriv_error
  task_number: 12
- id: mc_quotient_rule_error
  title: Ошибка в формуле производной дроби
  text: |
    Ошибка в формуле производной частного. (f/g)'=(f'g-fg')/g^2.
    Знак минус в числителе — частая ошибка.
  error_tag: quotient_rule_error
  task_number: 12
- id: mc_product_rule_error
  title: Ошибка в формуле производной произведения
  text: |
    Ошибка в формуле производной произведения.
    (fg)'=f'g+fg'. Забываешь второе слагаемое.
  error_tag: product_rule_error
  task_number: 12
# Task 6 — equations
- id: mc_wrong_base_reduction
  title: Неверное приведение к общему основанию
  text: |
    Не привёл обе части показательного уравнения к одному основанию или ошибся в степени.
    Пример: $4^x = 8$ → $(2^2)^x = 2^3$ → $2^{2x} = 2^3$ → $2x=3$.
  error_tag: wrong_base_reduction
  task_number: 6
- id: mc_log_domain_missed
  title: Не учтена ОДЗ логарифма
  text: |
    Аргумент логарифма должен быть строго положительным: $\ln x$ при $x>0$, $\log_a f(x)$ при $f(x)>0$.
    После решения проверь все корни в ОДЗ.
  error_tag: log_domain_missed
  task_number: 6
- id: mc_log_property_error
  title: Неверное свойство логарифма
  text: |
    Путаешь $\log(ab)$ с $\log a + \log b$ — первое верно; но $\log(a+b) \neq \log a + \log b$.
    Проверяй формулы суммы и разности логарифмов.
  error_tag: log_property_error
  task_number: 6
- id: mc_exp_property_error
  title: Неверное свойство степени
  text: |
    Путаешь $(a^m)^n$ с $a^{m+n}$ или складываешь показатели при разных основаниях.
    $(a^m)^n = a^{mn}$; $a^m a^n = a^{m+n}$ только при одном основании $a$.
  error_tag: exp_property_error
  task_number: 6
- id: mc_trig_lost_solutions
  title: Потеряны решения тригонометрического уравнения
  text: |
    У sin и cos бесконечно много решений с периодом $2\pi$; не ограничивайся одним углом без учёта серий.
    Проверь условие на отрезке или общую формулу.
  error_tag: trig_lost_solutions
  task_number: 6
- id: mc_trig_extra_solutions
  title: Лишние корни в тригонометрии
  text: |
    После возведения в квадрат или деления на $\cos x$ могут появиться посторонние корни — подставь в исходное уравнение.
  error_tag: trig_extra_solutions
  task_number: 6
- id: mc_irrational_no_check
  title: Не проверены корни иррационального уравнения
  text: |
    После возведения в квадрат обязательно подставь корни в исходное уравнение и проверь ОДЗ ($\sqrt{f}$ требует $f \ge 0$).
  error_tag: irrational_no_check
  task_number: 6
- id: mc_quadratic_discriminant_error
  title: Ошибка в дискриминанте или формуле корней
  text: |
    $D = b^2 - 4ac$ для $ax^2+bx+c=0$. Перепроверь знаки при переносе слагаемых и деление на $2a$.
  error_tag: quadratic_discriminant_error
  task_number: 6
- id: mc_forgot_back_substitution
  title: Забыта обратная замена
  text: |
    Решил уравнение относительно $t = a^x$ или $t = \sin x$, но не вернулся к $x$.
    После нахождения $t$ обязательно реши $a^x = t$ или $\sin x = t$ с учётом ОДЗ.
  error_tag: forgot_back_substitution
  task_number: 6
- id: mc_sign_error_in_equation
  title: Ошибка знака при преобразовании уравнения
  text: |
    При переносе через «=» знак меняется. Частая ошибка — минус при раскрытии скобок или при делении на отрицательное число.
  error_tag: sign_error_in_equation
  task_number: 6

# ── Task 13: trigonometric equations + interval root selection ──
- id: mc_trig_forgot_odz_function
  title: Забыта ОДЗ тригофункции (tg/ctg/log/sqrt)
  text: |
    В уравнении есть $\tg x$ ($\Rightarrow \cos x\ne 0$), $\ctg x$ ($\Rightarrow \sin x\ne 0$), $\log f(x)$ ($\Rightarrow f(x)>0$), $\sqrt{f(x)}$ ($\Rightarrow f(x)\ge 0$) — а ОДЗ не выписана. После решения корни не проверены.
    Как исправить: выпиши ОДЗ ДО решения. После нахождения корней подставь каждый в условие ОДЗ — отбрось не проходящие. Например, $\log_2(\sin x)$ требует $\sin x>0$, что сразу делит круг пополам.
  error_tag: trig_forgot_odz_function
  task_number: 13
- id: mc_trig_forgot_odz_denominator
  title: Не проверен знаменатель в дроби P/Q = 0
  text: |
    В уравнении $P(x)/Q(x)=0$ найдены корни числителя, но не подставлены в знаменатель. Часть из них могла обратить знаменатель в ноль — это «лишние» корни.
    Как исправить: $\frac{P}{Q}=0\Leftrightarrow P=0$ И $Q\ne 0$. Каждый корень числителя проверь подстановкой в знаменатель и отбрось те, где $Q=0$.
  error_tag: trig_forgot_odz_denominator
  task_number: 13
- id: mc_trig_wrong_reduction
  title: Ошибка в формулах приведения
  text: |
    При сдвиге аргумента ($x\pm\pi/2$, $x\pm\pi$, $x\pm 3\pi/2$) перепутали либо знак, либо переход функция↔конфункция. Например, $\cos(\pi+x)=+\cos x$ вместо $-\cos x$, или $\sin(\pi/2-x)=\sin x$ вместо $\cos x$.
    Как исправить: правило двух шагов. Шаг 1: знак — определи четверть исходного $x$ внутри сдвинутого аргумента и знак функции в этой четверти. Шаг 2: при сдвиге на $\pi/2$ или $3\pi/2$ функция меняется на конфункцию ($\sin\leftrightarrow\cos$, $\tg\leftrightarrow\ctg$); при $\pi$ или $2\pi$ — нет.
  error_tag: trig_wrong_reduction
  task_number: 13
- id: mc_trig_wrong_double_angle
  title: Ошибка в формулах двойного угла или тождествах
  text: |
    Используют неправильную форму $\cos 2x$ (например, $\cos^2 x+\sin^2 x$ вместо $\cos^2 x-\sin^2 x$) или забывают $\sin 2x=2\sin x\cos x$.
    Как исправить: запомни три формы $\cos 2x=\cos^2 x-\sin^2 x=2\cos^2 x-1=1-2\sin^2 x$. Выбирай ту, которая оставит в уравнении одну функцию (если хочешь только $\cos x$, бери $2\cos^2 x-1$).
  error_tag: trig_wrong_double_angle
  task_number: 13
- id: mc_trig_substitution_no_check
  title: После замены не проверены ограничения на t
  text: |
    Сделана замена $t=\sin x$, $t=\cos x$ или $t=a^{\sin x}$, решено квадратное по $t$. Но не отброшены значения $t$ с $|t|>1$ (для $\sin/\cos$) или $t\le 0$ (для $a^x$).
    Как исправить: сразу после замены запиши область допустимых $t$. После решения квадратного отбрось «нефизичные» корни. Например, $t=\sin x$ — корни $t_1=0{,}5$ и $t_2=-2$, второй отбрасываем.
  error_tag: trig_substitution_no_check
  task_number: 13
- id: mc_trig_lost_series_subst
  title: Потеряна серия при универсальной подстановке
  text: |
    Применили $t=\tg(x/2)$, выразили $\sin x$ и $\cos x$ через $t$. Подстановка не определена при $\cos(x/2)=0$, то есть при $x=\pi+2\pi n$ — серия теряется.
    Как исправить: после подстановки $\tg(x/2)$ обязательно проверь подстановкой серию $x=\pi+2\pi n$ в исходное уравнение. Если она удовлетворяет — добавь её к решению вручную.
  error_tag: trig_lost_series_subst
  task_number: 13
- id: mc_trig_interval_endpoint
  title: Путаница с включением концов отрезка
  text: |
    Корень совпадает с концом отрезка, но включён/исключён неверно. Условие «$[a;b]$» — оба конца включены, «$(a;b)$» — оба исключены, «$[a;b)$» или «$(a;b]$» — несимметрично.
    Как исправить: подставь концы $a$ и $b$ в формулу серии корней. Если получается целое $k$ — корень есть, добавь/исключи в соответствии с типом промежутка.
  error_tag: trig_interval_endpoint
  task_number: 13
- id: mc_trig_selection_per_series_skip
  title: Отбор только для одной серии корней
  text: |
    Если уравнение даёт две (и более) серий корней (например, $x=\pi/3+2\pi k$ и $x=-\pi/3+2\pi k$), а двойное неравенство решено только для одной из них.
    Как исправить: для каждой серии $x=x_0^{(i)}+T_i k$ — отдельное двойное неравенство $a\le x_0^{(i)}+T_i k\le b$. Решай относительно $k\in\mathbb{Z}$ независимо. Все найденные значения — в ответ.
  error_tag: trig_selection_per_series_skip
  task_number: 13
- id: mc_trig_selection_circle_misread
  title: Неверно выделена дуга на единичной окружности
  text: |
    На круге отметили точки-корни, но дугу промежутка $[a;b]$ обвели не в ту сторону или не до конца.
    Как исправить: иди от $a$ к $b$ против часовой стрелки (направление возрастания угла). Если $b<a+2\pi$ — дуга меньше полного оборота. На дуге считай те точки-корни, которые в неё попали, с правильным значением $k$.
  error_tag: trig_selection_circle_misread
  task_number: 13
- id: mc_trig_enumeration_no_outside_check
  title: Перебор k без проверки соседних значений
  text: |
    При отборе через перебор $k$ выписали значения $x$ внутри отрезка, но не показали, что соседние $k$ дают $x$ ВНЕ отрезка. По критериям ЕГЭ это снимает балл за обоснованность.
    Как исправить: перед минимальным подходящим $k$ выпиши $k-1$ и покажи, что $x_{k-1}<a$. Аналогично после максимального — $k+1$ даёт $x_{k+1}>b$. Это и есть полное обоснование.
  error_tag: trig_enumeration_no_outside_check
  task_number: 13
- id: mc_trig_wrong_arc_inverse
  title: Ошибка с arcsin/arccos от отрицательного
  text: |
    Записали $\arccos(-a)=-\arccos a$ (неверно) или $\arcsin(-a)=\pi-\arcsin a$ (неверно).
    Как исправить: $\arcsin(-a)=-\arcsin a$ (нечётная); $\arccos(-a)=\pi-\arccos a$ (НЕ нечётная); $\arctg(-a)=-\arctg a$ (нечётная). Если ученик путает — проверять подстановкой в $\sin/\cos$ соответствующего значения.
  error_tag: trig_wrong_arc_inverse
  task_number: 13
- id: mc_trig_merging_series_wrong
  title: Неверное объединение или расщепление серий
  text: |
    Серии $x=\pi/2+2\pi k$ и $x=-\pi/2+2\pi k$ можно объединить в $x=\pi/2+\pi k$ — это верно, шаг сократился. Обратное объединение/расщепление: ошибочно перевели $x=\pi n$ (шаг $\pi$) в одну серию $x=2\pi n$ (потеря половины корней).
    Как исправить: проверка через подстановку $k=0,1,2$ — если все полученные значения покрываются «объединённой» формулой, объединение корректно. Иначе — нет.
  error_tag: trig_merging_series_wrong
  task_number: 13

# ── Task 16: financial mathematics ──
- id: mc_fin_simple_vs_compound
  title: Простые проценты вместо сложных
  text: |
    Использовали $S_n=S_0(1+nr)$ вместо $S_n=S_0(1+r)^n$. На длинных сроках разница огромная.
    Как исправить: при сложных процентах сумма умножается на $k=1+r$ КАЖДЫЙ период (накапливаются «проценты на проценты»). Простые — линейный рост, в задачах 16-й почти не встречается; формулировка «процент от текущего долга / накопленной суммы» = сложные.
  error_tag: fin_simple_vs_compound
  task_number: 16
- id: mc_fin_wrong_base_for_percent
  title: Процент от первоначальной суммы вместо текущего долга
  text: |
    Начислили проценты на исходные $S$ во все годы, а не на текущий долг $D_{i-1}$.
    Как исправить: $\text{новый долг}=D_{i-1}\cdot k$, где $k=1+r/100$. Каждый год $D_{i-1}$ — РАЗНЫЙ. После выплаты $X_i$ остаток $D_i=D_{i-1}\cdot k-X_i$. Никогда не возвращайся к исходному $S$ при следующем начислении.
  error_tag: fin_wrong_base_for_percent
  task_number: 16
- id: mc_fin_off_by_one_periods
  title: Off-by-one в количестве периодов
  text: |
    Использовали $n+1$ или $n-1$ начислений процентов вместо $n$, либо неверно сосчитали число платежей.
    Как исправить: построй таблицу долга по периодам с явной нумерацией ($i=0,1,\ldots,n$). $D_0=S$ (взяли кредит), $D_n=0$ (полностью погашен) — на схеме видно, сколько начислений и платежей.
  error_tag: fin_off_by_one_periods
  task_number: 16
- id: mc_fin_order_charge_payment
  title: Перепутан порядок «проценты — платёж»
  text: |
    Сначала вычли платёж из долга, потом начислили проценты на остаток (или наоборот, не как в условии).
    Как исправить: внимательно прочитай условие. Стандарт ЕГЭ: «в январе долг увеличивается на $r\%$, с февраля по июнь выплачивается часть долга». Значит: $D_{i-1}\to D_{i-1}\cdot k\to D_{i-1}\cdot k-X_i$. Запиши порядок на бумаге перед расчётом.
  error_tag: fin_order_charge_payment
  task_number: 16
- id: mc_fin_wrong_growth_factor
  title: Перепутан коэффициент роста
  text: |
    Записали $k=p/100$ вместо $k=1+p/100$. Например, при ставке $10\%$ умножали на $0{,}1$ вместо $1{,}1$.
    Как исправить: коэффициент роста = «не меньше единицы» — это и старая сумма, и проценты. $p\%\Rightarrow k=1+p/100$. Самопроверка: если $p=0\%$, должно быть $k=1$ (долг не меняется); подставь и проверь.
  error_tag: fin_wrong_growth_factor
  task_number: 16
- id: mc_fin_geometric_sum_index_off
  title: Ошибка в индексе суммы геометрической прогрессии
  text: |
    В формуле аннуитета число слагаемых в $1+k+k^2+\ldots$ взяли $n+1$ или $n-1$ вместо $n$.
    Как исправить: после $n$ платежей сумма $1+k+k^2+\ldots+k^{n-1}$ содержит ровно $n$ слагаемых, обозначений степеней от $0$ до $n-1$. Значение: $\frac{k^n-1}{k-1}$. Проверь на $n=2$: $1+k=\frac{k^2-1}{k-1}$ — верно.
  error_tag: fin_geometric_sum_index_off
  task_number: 16
- id: mc_fin_boundary_debt_not_zero
  title: Не использовано условие D_n = 0
  text: |
    Кредит должен быть полностью погашен, но условие $D_n=0$ не записано как уравнение, или записано не для последнего периода.
    Как исправить: «к июлю $n+1$-го года долг полностью погашен» = $D_n=0$ — это твоё ключевое уравнение на $X$, $S$ или $r$. Без него задача не замыкается. Если по условию долг не нулевой (вклад/смешанная схема), используй то, что задано.
  error_tag: fin_boundary_debt_not_zero
  task_number: 16
- id: mc_fin_table_share_misread
  title: Неверно прочитана таблица долей долга
  text: |
    Таблица в условии задаёт долг на середину года как долю от первоначального ($\alpha_i\cdot S$). Перепутали с «долей от предыдущего периода» или не заметили, что $\alpha$ — доля от $S$, а не процент.
    Как исправить: $D_i=\alpha_i\cdot S$, где $\alpha_i$ — десятичная доля из таблицы (0,7 = 70% от $S$). Платёж $X_i=D_{i-1}\cdot k - D_i = S(\alpha_{i-1}k-\alpha_i)$.
  error_tag: fin_table_share_misread
  task_number: 16
- id: mc_fin_annuity_vs_diff_confusion
  title: Перепутаны аннуитетная и дифференцированная схемы
  text: |
    Думают, что «аннуитет» = равные части тела долга. На самом деле — равные ПЛАТЕЖИ, а тело долга гасится неравномерно.
    Как исправить: аннуитет — все $X_i$ одинаковы, формула $X=\frac{Sk^n(k-1)}{k^n-1}$. Дифференцированная — равные части тела ($S/n$), платежи убывают линейно (АП). Проверка: «равные платежи» в условии = аннуитет.
  error_tag: fin_annuity_vs_diff_confusion
  task_number: 16
- id: mc_fin_replenishment_timing
  title: Время пополнения вклада
  text: |
    Пополнение «в начале года» проходит ДО начисления (участвует в нём). «В конце года» — ПОСЛЕ (не участвует). Перепутали — занизили или завысили итог.
    Как исправить: распиши на бумаге одну строку таблицы. Если пополнение «в начале»: $D_{\text{нач}}+a\to (D_{\text{нач}}+a)k$. Если «в конце»: $D_{\text{нач}}\to D_{\text{нач}}\cdot k\to D_{\text{нач}}\cdot k+a$.
  error_tag: fin_replenishment_timing
  task_number: 16
- id: mc_fin_overpayment_calc_error
  title: Переплата = сумма платежей − S
  text: |
    Переплату посчитали как сумму всех платежей $\sum X_i$ (без вычитания тела) или вычли неверно.
    Как исправить: переплата $\Delta=\sum X_i - S$ (общая сумма выплат минус сумма, которую брали в кредит). Если в условии «общая сумма выплат», подразумевают $\sum X_i$, не путай.
  error_tag: fin_overpayment_calc_error
  task_number: 16
- id: mc_fin_integer_constraint_ignored
  title: Забыто требование целочисленности
  text: |
    В условии «целое число миллионов рублей» или «целая ставка $r\%$», а в ответе — нецелое число (например, $S=3{,}45$).
    Как исправить: если решая неравенство получил $S<3{,}45$ и нужно «наибольшее целое $S$» — ответ $S=3$. Подставь это $S$ обратно и проверь, что условие задачи выполнено.
  error_tag: fin_integer_constraint_ignored
  task_number: 16
- id: mc_fin_monthly_yearly_mismatch
  title: Месячная ставка использована как годовая
  text: |
    В условии $r\%$ начисляется 1-го числа каждого месяца — это МЕСЯЧНАЯ ставка. Подставили её в формулу годовых периодов или наоборот.
    Как исправить: $k$ и единица периода ($n$) должны быть согласованы. «$r\%$ ежемесячно, $n$ месяцев» $\Rightarrow$ $k=1+r/100$, периодов $n$. «$r\%$ годовых» $\Rightarrow$ периодов = годы, не месяцы.
  error_tag: fin_monthly_yearly_mismatch
  task_number: 16
