- id: t06_mm02
  title: Показательное уравнение с разными основаниями
  text: |
    $a^{f(x)} = b$ с числом $b$: представь $b$ как степень того же основания $a$, или
    логарифмируй: $f(x)= \log_a b$ (если $a>0$, $a\neq 1$, $b>0$). Пример: $3^x = 81$ → $3^x=3^4$ → $x=4$.
  task_number: 6
