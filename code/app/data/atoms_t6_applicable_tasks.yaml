- id: t06_mm05
  title: Область определения логарифма
  text: |
    $\log_a u(x)$ определён при $u(x) > 0$ и $a>0$, $a\neq 1$. Всегда записывай ОДЗ и проверяй корни
    в исходном уравнении. Логарифм от нуля или отрицательного числа не определён.
  task_number: 6
