- id: t06_mm03
  title: Свойства степеней при решении уравнений
  text: |
    $(a^m)^n = a^{mn}$, $a^m \cdot a^n = a^{m+n}$, $a^m/a^n = a^{m-n}$. Не складывай показатели при умножении разных оснований.
    $(ab)^n = a^n b^n$. Ошибка: писать $a^{m+n} = a^m + a^n$ — неверно.
  task_number: 6
  subtypes:
