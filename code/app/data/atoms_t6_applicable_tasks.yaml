- id: t06_mm06
  title: Основные свойства логарифмов
  text: |
    $\log_a(xy) = \log_a x + \log_a y$, $\log_a(x/y) = \log_a x - \log_a y$, $\log_a x^k = k\log_a x$
    (при $x>0$). Не путай: $\log(x+y) \neq \log x + \log y$.
  task_number: 6
  subtypes:
