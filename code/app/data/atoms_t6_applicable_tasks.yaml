- id: t06_mm07
  title: Логарифмическое уравнение с одинаковым основанием
  text: |
    Если $\log_a f(x) = \log_a g(x)$, то $f(x)=g(x)$ в пересечении ОДЗ: $f>0$, $g>0$.
    Сначала приведи обе части к одному основанию через формулу перехода: $\log_a x = \frac{\ln x}{\ln a}$.
  task_number: 6
  subtypes:
