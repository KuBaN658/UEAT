- id: t06_mm01
  title: Показательное уравнение с одинаковым основанием
  text: |
    Если $a^{f(x)} = a^{g(x)}$ при $a>0$, $a\neq 1$, то $f(x)=g(x)$. Сначала приведи обе части к одному основанию:
    $b = a^k \Rightarrow b^{h(x)} = a^{k h(x)}$. Пример: $4^x = 8^{x-1}$ → $(2^2)^x = (2^3)^{x-1}$ → $2^{2x}=2^{3x-3}$ → $2x=3x-3$.
  task_number: 6
  subtypes:
