- id: t06_mm08
  title: Уравнение вида $\log_a f(x) = b$
  text: |
    Переход к показательной форме: $f(x) = a^b$. Проверь $f(x)$ на ОДЗ.
    Пример: $\log_2 (x+3) = 4$ → $x+3 = 2^4 = 16$ → $x=13$, проверка $x+3>0$.
  task_number: 6
  subtypes:
