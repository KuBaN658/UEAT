- id: t06_mm15
  title: Квадратное уравнение и дискриминант
  text: |
    $ax^2+bx+c=0$, $D = b^2 - 4ac$. Корни $x_{1,2} = \frac{-b \pm \sqrt{D}}{2a}$ при $a \neq 0$.
    Проверь знаки при переносе слагаемых из одной части в другую.
  task_number: 6
  subtypes:
  - quadratic_eq
  error_tags:
  - quadratic_discriminant_error
  - sign_error_in_equation
  shared_skills:
  - equation_setup
  applicable_tasks: []
- id: t06_mm16
  title: Биквадратное уравнение
  text: |
    $ax^4 + bx^2 + c = 0$: $t = x^2 \ge 0$, решаешь $at^2 + bt + c = 0$. Для каждого $t_i>0$
    два значения $x = \pm\sqrt{t_i}$; если $t=0$ — один корень $x=0$.
  task_number: 6
  subtypes:
  - quadratic_eq
  error_tags:
  - forgot_back_substitution
  - quadratic_discriminant_error
  prerequisites:
  - t06_mm15
  applicable_tasks: []
