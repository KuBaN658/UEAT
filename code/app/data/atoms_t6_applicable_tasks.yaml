- id: t06_mm09
  title: Тригонометрические уравнения $\sin x = c$
  text: |
    $|c| \le 1$. На окружности: два угла в $[0,2\pi)$, затем $x = \pm \alpha + 2\pi k$ или
    общая формула через $\arcsin$. Не теряй решения из-за периодичности.
  task_number: 6
  subtypes:
  - trigonometric_eq
  error_tags:
  - trig_lost_solutions
  - trig_extra_solutions
  applicable_tasks: []
- id: t06_mm10
  title: Тригонометрические уравнения $\cos x = c$
  text: |
    $|c| \le 1$. На $[0,2\pi)$: два решения или одно при $c=\pm 1$. Общая формула:
    $x = \pm \arccos c + 2\pi k$ (или комбинации в зависимости от выбора). Проверь отбор корней по
    условию (например, отрезок).
  task_number: 6
  subtypes:
  - trigonometric_eq
  error_tags:
  - trig_lost_solutions
  - trig_extra_solutions
  prerequisites:
  - t06_mm09
  applicable_tasks: []
- id: t06_mm11
  title: Сведение тригонометрии к квадратному уравнению
  text: |
    Уравнения вида $a\sin^2 x + b\sin x + c = 0$: положи $t = \sin x$, $|t| \le 1$.
    После решения по $t$ решай $\sin x = t_1$ с учётом серий. Не забудь вернуться к $x$.
  task_number: 6
  subtypes:
  - trigonometric_eq
  - quadratic_eq
  error_tags:
  - forgot_back_substitution
  - trig_lost_solutions
  prerequisites:
  - t06_mm09
  applicable_tasks: []
- id: t06_mm12
  title: Формулы приведения и однородные уравнения
  text: |
    $a\sin x + b\cos x = 0$ → деление на $\cos x \neq 0$ или введение $t = \tan(x/2)$.
    Осторожно с потерей корней при делении. Альтернатива: $\sqrt{a^2+b^2}\sin(x+\varphi)$.
  task_number: 6
  subtypes:
  - trigonometric_eq
  error_tags:
  - trig_extra_solutions
  - sign_error_in_equation
  prerequisites:
  - t06_mm09
  applicable_tasks: []
