- id: t06_mm04
  title: Замена в показательном уравнении
  text: |
    Вид $a^{2x} + a^x - 1 = 0$: положи $t = a^x > 0$, получи $t^2 + t - 1 = 0$. После решения по $t$
    вернись к $x$: $a^x = t_1$ → $x = \log_a t_1$. Отбрасывай $t \le 0$.
  task_number: 6
  subtypes:
  - exponential_eq
  - combined_eq
  error_tags:
  - forgot_back_substitution
  - quadratic_discriminant_error
  shared_skills:
