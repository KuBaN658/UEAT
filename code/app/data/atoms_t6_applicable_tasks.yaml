  title: Иррациональные уравнения — возведение в квадрат
  text: |
    Если $\sqrt{f(x)} = g(x)$, то $f(x) = g^2(x)$ и обязательно $g(x) \ge 0$ и $f(x) \ge 0$.
    После решения подставь проверку в исходное уравнение — появляются посторонние корни.
