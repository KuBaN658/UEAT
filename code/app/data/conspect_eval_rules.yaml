# G-Eval rules for conspect quality evaluation.
#
# Three metrics are evaluated against the FULL conspect markdown.
# overall_score = mean(personalization, school_format, math_correctness)
#
# personalization — cross-section metric; uses student profile as LLM input.
# school_format   — ЕГЭ/school-level format, section completeness and purpose match.
# math_correctness — correctness of all formulas, expressions, and calculations.

metrics:
  personalization:
    # include_input: true means the student profile is passed as the `input`
    # field of the test case so the judge can compare conspect against the profile.
    include_input: true
    criteria: >
      Конспект адаптирован под конкретного ученика: учитывает его главную ошибку (top_err),
      профиль ошибок (top_errors), frontier-темы и типы заданий из недавних неверных попыток
      (recent_wrong). Генерализованный шаблон без персонализации получает низкую оценку.
    evaluation_steps:
      - "Из поля `input` извлеки: top_err (главная ошибка ученика), top_errors (список ошибок),
         frontier_atoms (список frontier-тем), recent_wrong (список задач с task_number, subtype
         и кратким текстом)."
      - "Проверь разделы «Что важно запомнить» и «Типичные ошибки»: первые 1–2 пункта каждого
         раздела должны прицельно адресовать именно top_err. Если первые пункты про другую тему —
         значительный штраф."
      - "Проверь раздел «Найди ошибку»: демонстрируемая ошибка должна соответствовать типу top_err,
         а не быть произвольной. Если тема «Найди ошибку» не связана с top_err — штраф."
      - "Проверь «Разбор примера»: задача должна концентрироваться на номерах заданий, где ученик
         чаще ошибается (по recent_wrong и top_errors). Если recent_wrong содержит только задания
         №12, а разбор посвящён №6 без объяснения — штраф."
      - "Если frontier_atoms не пуст, проверь, что хотя бы одна frontier-тема упомянута в
         «Что важно запомнить» или «Алгоритме решения» (не обязательно дословно, но по смыслу)."
      - "Вынеси общую оценку: если конспект мог бы быть сгенерирован без какого-либо профиля
         ученика (все разделы равномерно покрывают задания 6/10/12 без акцента), снизь оценку
         вплоть до 0.0. Если конспект явно нацелен на слабые места конкретного ученика — оценка 0.8+."

  school_format:
    include_input: false
    criteria: >
      Конспект соответствует школьному формату подготовки к ЕГЭ: все обязательные разделы
      присутствуют и содержат контент, соответствующий их назначению; объяснения написаны
      простым языком, понятным ученику 9–11 класса; структура и подача материала адаптированы
      для школьника, а не студента вуза.
    evaluation_steps:
      - "Проверь наличие всех шести обязательных разделов: «Что важно запомнить»,
         «Типичные ошибки», «Алгоритм решения», «Разбор примера», «Найди ошибку»,
         «Чеклист перед ответом». Штраф за каждый отсутствующий или полностью пустой раздел."
      - "Для каждого раздела проверь соответствие контента его назначению:
         «Что важно запомнить» — правила с формулами и объяснением «почему»;
         «Типичные ошибки» — конкретные ошибки с исправлением и числовым примером;
         «Алгоритм решения» — пошаговые инструкции для заданий №6, №10, №12;
         «Разбор примера» — одна полностью решённая задача с условием, решением и ответом;
         «Найди ошибку» — одно намеренно неверное решение со структурой разбора;
         «Чеклист перед ответом» — список действий самопроверки в формате «- [ ]».
         Штраф за каждый раздел, чей контент не соответствует назначению."
      - "Проверь язык всего конспекта: нет ли вузовских или профессиональных терминов без
         объяснения. Снизь оценку за каждый термин, недоступный ученику 9–11 класса (кроме
         стандартных школьных математических терминов)."
      - "Проверь, что объяснения правил и формул сопровождаются аналогиями, короткими примерами
         или интуитивными пояснениями на школьном уровне, а не сухими определениями."
      - "Проверь алгоритмы и шаги: каждый шаг должен быть конкретным действием («Найди
         производную», «Приравняй к нулю»), а не общей инструкцией («Используй формулу»,
         «Вычисли»). Штраф за расплывчатые рекомендации."
      - "Проверь раздел «Алгоритм решения»: должны быть явные подблоки для заданий №6, №10 и
         №12 с 4–5 шагами в каждом. Штраф за отсутствие хотя бы одного подблока."
      - "Проверь раздел «Чеклист перед ответом»: ровно 5 пунктов «- [ ] ...», каждый —
         конкретное действие самопроверки, охватывающее задания №6, №10 и №12. Штраф при
         другом количестве пунктов или неверном формате."
      - "Проверь не содержит ли конспект рассуждения модели в каком-либо разделе,
         не являющиеся контентом для ученика. Штраф за каждое такое рассуждение."

  math_correctness:
    include_input: false
    criteria: >
      Все математические выражения, формулы и расчёты в конспекте математически корректны
      и записаны в правильном формате. Финальные ответы в примерах — только целые числа
      или конечные десятичные дроби.
    evaluation_steps:
      - "Проверь все формулы во всех разделах: они должны быть записаны в LaTeX
         ($...$ или $$...$$). Штраф за каждую формулу вне LaTeX или с синтаксической
         ошибкой в LaTeX-разметке."
      - "В разделе «Что важно запомнить» проверь каждую формулу на математическую
         корректность: нет ли алгебраических ошибок, неверных знаков, ошибочных условий
         применения правила."
      - "В разделе «Разбор примера» последовательно проверь все шаги решения: арифметику,
         алгебраические преобразования, подстановки и финальный ответ. Штраф за любую
         математическую ошибку в цепочке вычислений."
      - "В разделе «Найди ошибку» проверь три вещи: (1) ошибочное решение содержит ровно
         одну математическую ошибку; (2) правильный ответ математически верен; (3) предложенное
         исправление устраняет именно указанную ошибку. Штраф за математическую ошибку в
         «правильном» ответе."
      - "В разделе «Типичные ошибки» проверь все числовые контрпримеры: числа и вычисления
         должны быть верными. Штраф за арифметическую ошибку в контрпримере."
      - "Проверь финальные ответы во всех решённых задачах («Разбор примера», «Найди ошибку»):
         ответ должен быть только целым числом или конечной десятичной дробью. Присутствие
         √, π, обычной дроби, буквенного выражения или знака «≈» является нарушением."
