- id: t16_mm01
  title: Сложные проценты — формула роста
  text: 'Если на сумму $S_0$ ежегодно начисляется $p\%$ сложных процентов, то через $n$ лет: $S_n=S_0(1+r)^n$, где $r=p/100$. Каждый период проценты начисляются на текущую сумму, а не на исходную. Это основа всех финансовых задач 16-й.

