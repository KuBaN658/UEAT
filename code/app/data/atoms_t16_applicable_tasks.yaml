- id: t16_mm09
  title: Сумма выплат и переплата (аннуитет)
  text: 'Общая сумма выплат $B=nX$. Переплата $\Delta=B-S=nX-S$. Иногда задача формулируется как «найди $S$, при котором $\Delta=$ задано» — пишешь уравнение $nX-S=\Delta$ и подставляешь $X$ из формулы аннуитета.

