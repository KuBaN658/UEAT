- id: t16_mm16
  title: Смешанный график (проценты + равные платежи)
  text: 'Первые $m$ лет заёмщик платит только проценты ($D$ не меняется), потом $n-m$ лет — равные платежи. На «процентном» этапе сумма выплат $= m\cdot rS$. На втором этапе — стандартный аннуитет с $n-m$ периодами на тот же $S$. Складывай оба этапа.

