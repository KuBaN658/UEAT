- id: t16_mm28
  title: Месячные периоды
  text: 'Если в условии «1-го числа каждого месяца долг растёт на $r\%$», то $r$ — это МЕСЯЧНАЯ ставка, $n$ — число месяцев. Все формулы те же ($k=1+r/100$, $D_i=D_{i-1}k-X_i$), просто единицы другие. Не путай с годовой $(1+r_{\text{год}})$ — иначе ошибка в десятки раз.

