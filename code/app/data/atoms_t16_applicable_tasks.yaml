- id: t16_mm02
  title: Коэффициент роста k = 1 + p/100
  text: 'Если ставка $p\%$ за период, то после начисления сумма умножается на $k=1+p/100$. Например, $p=10\%\Rightarrow k=1{,}1$; $p=20\%\Rightarrow k=1{,}2$. Используй $k$ как один множитель — это сильно сокращает запись и уменьшает вероятность ошибок.

