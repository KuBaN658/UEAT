- id: t16_mm07
  title: Аннуитетный кредит — постановка
  text: 'Заёмщик берёт $S$ под $p\%$ за период, гасит $n$ равными платежами $X$. После $n$ периодов долг должен быть нулём: $D_n=0$. Из этого условия выводится формула на $X$ через геометрическую прогрессию.

