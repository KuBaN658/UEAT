  title: Целочисленные ограничения в условии
  text: '«Целое число миллионов», «целая ставка $r\%$»: внимательно выпиши, в каких единицах величина и какое целое требуется. Если из неравенства получается $S<3{,}45$, то наибольшее целое — $3$, а не $3{,}45$.

