- id: t16_mm14
  title: Кредит с заданной таблицей долга
  text: 'Условие задаёт долг в начале каждого июля как долю от $S$: $D_i=\alpha_i S$, например $\alpha_0=1, \alpha_1=0{,}6, \alpha_2=0{,}3, \alpha_3=0$. Платёж $X_i$ — это разность между долгом после начисления процентов и заданным $D_i$: $X_i=\alpha_{i-1}Sk-\alpha_i S=S(\alpha_{i-1}k-\alpha_i)$.

    '
  task_number: 16
  subtypes:
