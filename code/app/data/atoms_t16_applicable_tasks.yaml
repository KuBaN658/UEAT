- id: t16_mm12
  title: Размер i-го дифференцированного платежа
  text: 'Перед $i$-м платежом долг $D_{i-1}=\dfrac{S(n-i+1)}{n}$. После начисления процентов: $D_{i-1}\cdot k$. Платёж $X_i=D_{i-1}\cdot k - D_i = \dfrac{S}{n}+r\cdot\dfrac{S(n-i+1)}{n}$ (тело + проценты на остаток до начисления).

