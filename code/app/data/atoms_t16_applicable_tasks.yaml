- id: t16_mm21
  title: Накопительный вклад без пополнений
  text: 'Вклад $S_0$ под $p\%$ за период растёт по формуле сложных процентов: $S_n=S_0\cdot k^n$, $k=1+p/100$. Никаких платежей не вычитаем — деньги только накапливаются. Прибыль вкладчика: $S_n-S_0$.

    '
  task_number: 16
  subtypes:
  - deposit
  error_tags: []
  prerequisites:
  - t16_mm01
  shared_skills: []
  applicable_tasks:
  - 4221BE
- id: t16_mm22
  title: Вклад с регулярным пополнением
  text: 'Если в начале каждого периода вкладчик добавляет $a$, после $n$ периодов: $S_n=S_0 k^n+a(k^n+k^{n-1}+\ldots+k)=S_0 k^n+ak\cdot\dfrac{k^n-1}{k-1}$. Если пополнение в конце периода — последний взнос не успевает попасть под начисление: $S_n=S_0 k^n+a\cdot\dfrac{k^n-1}{k-1}$.

    '
  task_number: 16
  subtypes:
  - deposit
  error_tags:
  - fin_replenishment_timing
  prerequisites:
  - t16_mm05
  shared_skills: []
  applicable_tasks:
  - 4221BE
- id: t16_mm23
  title: Время пополнения относительно начисления
  text: 'Пополнение «в начале периода» проходит до начисления процентов — успевает поучаствовать в начислении. «В конце периода» — после, проценты на него не идут в этом периоде. Перепутать = занизить/завысить итог. Обязательно фиксируй порядок на бумаге.

    '
  task_number: 16
  subtypes:
  - deposit
  error_tags:
  - fin_replenishment_timing
  prerequisites: []
  shared_skills: []
  applicable_tasks:
  - 4221BE
- id: t16_mm24
  title: Сравнение двух стратегий вклада
  text: 'Когда два вкладчика (Марина и Надежда) с разными графиками: для каждого выпиши $S_n$ как функцию параметра, потом найди разность или равенство. Обычно один кладёт сразу всё, второй частями — после нужного количества периодов один обгоняет другого.

    '
  task_number: 16
  subtypes:
  - deposit
  error_tags: []
  prerequisites:
  - t16_mm22
  shared_skills: []
  applicable_tasks:
  - 4221BE
- id: t16_mm25
  title: Простые проценты vs сложные
  text: 'При простых процентах сумма растёт линейно: $S_n=S_0(1+nr)$. При сложных — экспоненциально: $S_n=S_0(1+r)^n$. На длинных сроках сложные сильно больше. В задачах 16-й почти всегда сложные — но всё равно проверь формулировку условия.

    '
