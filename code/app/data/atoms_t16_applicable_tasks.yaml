- id: t16_mm15
  title: Сумма платежей по таблице долга
  text: 'После выписки всех $X_i=S(\alpha_{i-1}k-\alpha_i)$ их сумма $B=\sum X_i=S(k\sum\alpha_{i-1}-\sum\alpha_i)$. Многие задачи сводятся к формуле $B=S\cdot[(k-1)\sum_{i=0}^{n-1}\alpha_i + \alpha_0]$ при $\alpha_n=0$.

    '
