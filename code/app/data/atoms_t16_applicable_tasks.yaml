- id: t16_mm27
  title: Off-by-one в количестве периодов
  text: '«Кредит на 4 года» — 4 платежа, 4 начисления процентов. Первый платёж — в конце 1-го года или в середине 2-го (по условию). Считай ОДНОВРЕМЕННО годы и платежи и сверяйся с условием. Часто ошибка: $n+1$ начислений на $n$ платежей или наоборот.

