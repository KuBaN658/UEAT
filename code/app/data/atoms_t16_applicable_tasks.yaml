  text: 'Если ищется $n$ (целое), стандартный приём: выразить $D_n$ как функцию $n$ и найти наименьшее целое, удовлетворяющее условию $D_n\le 0$ или конкретному равенству. В дифференцированном — это уравнение арифметической прогрессии.

