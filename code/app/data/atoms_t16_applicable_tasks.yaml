- id: t16_mm11
  title: Дифференцированный кредит — схема
  text: 'Тело долга $S$ делится на $n$ равных частей по $S/n$. Каждый период: проценты на текущий долг + одна часть тела. После $i$-го платежа долг $D_i=\dfrac{S(n-i)}{n}$. Платежи убывают линейно.

