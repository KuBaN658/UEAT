- id: t16_mm13
  title: Сумма дифференцированных платежей
  text: '$X_i$ образует арифметическую прогрессию (первый — $\frac{S}{n}+rS$, последний — $\frac{S}{n}+r\frac{S}{n}=\frac{S(1+r)}{n}$). Сумма: $B=\sum X_i = S + rS\cdot\frac{n+1}{2}$ (тело + проценты в среднем за полпериода). Переплата $\Delta=rS(n+1)/2$.

    '
