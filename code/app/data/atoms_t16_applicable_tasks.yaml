- id: t16_mm08
  title: Формула аннуитетного платежа
  text: 'Раскрывая рекурсию $n$ раз: $D_n=Sk^n - X\dfrac{k^n-1}{k-1}=0$. Отсюда $X=\dfrac{S\cdot k^n(k-1)}{k^n-1}=\dfrac{S\cdot r(1+r)^n}{(1+r)^n-1}$. На экзамене лучше выводить эту формулу через таблицу, а не подставлять «готовую».

    '
