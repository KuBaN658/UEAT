- id: t12_mm39
  title: Производные $\sin x$ и $\cos x$
  text: |-
    $(\sin x)' = \cos x$, $(\cos x)' = -\sin x$. С цепным правилом: $(\sin(g(x)))' = g'(x)\cos(g(x))$, $(\cos(g(x)))' = -g'(x)\sin(g(x))$. Знак минус у косинуса — самая частая ошибка.
  task_number: 12
  subtypes:
