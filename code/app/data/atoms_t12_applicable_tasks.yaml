- id: t12_mm09
  title: Производная многочлена
  text: |-
    Для $f(x)=a_n x^n + \ldots + a_1 x + a_0$: $f'(x) = na_n x^{n-1} + \ldots + a_1$. Пример: $f(x)=x^3-12x^2+36x+17$ → $f'(x)=3x^2-24x+36 = 3(x^2-8x+12) = 3(x-2)(x-6)$. Критические точки: $f'(x)=0$ → $x=2$ и $x=6$.
