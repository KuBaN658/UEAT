- id: t12_mm40
  title: Производные $\tan x$ и $\cot x$
  text: |-
    $(\tan x)' = \frac{1}{\cos^2 x}$, $(\cot x)' = -\frac{1}{\sin^2 x}$. ОДЗ: $\tan x$ при $x \neq \frac{\pi}{2}+\pi n$; $\cot x$ при $x \neq \pi n$. С цепным правилом: $(\tan(g(x)))' = \frac{g'(x)}{\cos^2(g(x))}$.
  task_number: 12
  subtypes:
