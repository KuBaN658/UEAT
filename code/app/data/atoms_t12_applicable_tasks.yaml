- id: t12_mm41
  title: Тригонометрические тождества при дифференцировании
  text: |-
    Полезные тождества: $\sin^2 x + \cos^2 x = 1$; $\sin 2x = 2\sin x \cos x$; $\cos 2x = \cos^2 x - \sin^2 x$. Часто после дифференцирования выражение упрощается через эти формулы.
  task_number: 12
  subtypes:
