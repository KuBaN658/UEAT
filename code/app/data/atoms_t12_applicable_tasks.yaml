  title: 'Экстремумы тригонометрических функций на отрезке: базовые'
  text: |-
    Для $f(x) = \sin x$ на $[a,b]$: $f'(x)=\cos x = 0$ → $x=\frac{\pi}{2}+\pi n$. Отбери $x \in [a,b]$, вычисли $f$ на концах и в критических точках. Помни: $\sin x \in [-1,1]$, $\cos x \in [-1,1]$ — используй для проверки.
