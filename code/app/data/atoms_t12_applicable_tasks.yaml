- id: t12_mm34
  title: Производная показательной функции $e^x$, $a^x$
  text: |-
    $(e^x)' = e^x$, $(a^x)' = a^x \ln a$. С цепным правилом: $(e^{g(x)})' = g'(x) \cdot e^{g(x)}$. Помни: $e^x > 0$ всегда, поэтому $e^{g(x)} \neq 0$ и критические точки определяются только $g'(x)$.
