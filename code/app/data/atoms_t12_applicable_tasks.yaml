- id: t12_mm31
  title: Разложение производной произведения на множители
  text: |-
    После дифференцирования вынеси общие множители. Пример: $(x^2 e^x)' = 2xe^x + x^2 e^x = xe^x(2+x)$. Критические точки: $x=0$ и $x=-2$ (т.к. $e^x > 0$ всегда).
