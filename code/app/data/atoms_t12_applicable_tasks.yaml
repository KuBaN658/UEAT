- id: t12_mm22
  title: Правило дифференцирования частного $\frac{f}{g}$
  text: |-
    $\left(\frac{f}{g}\right)' = \frac{f'g - fg'}{g^2}$. Запомни: «числитель: производная числителя × знаменатель МИНУС числитель × производная знаменателя». Знак минус — самая частая ошибка! Знаменатель всегда в квадрате.
