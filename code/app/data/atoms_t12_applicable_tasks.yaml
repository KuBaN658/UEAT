- id: t12_mm23
  title: Экстремумы дробной функции на отрезке
  text: |-
    Алгоритм для $\frac{f(x)}{g(x)}$ на $[a,b]$: (1) найди ОДЗ ($g(x) \neq 0$); (2) производная по правилу частного; (3) $f'g - fg' = 0$; (4) сравни значения в критических точках и на концах.
