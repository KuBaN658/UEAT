  title: 'Производная $|f(x)|$: правила и особенности'
  text: |-
    $(|f(x)|)' = f'(x) \cdot \text{sgn}(f(x)) = \frac{f(x)}{|f(x)|} \cdot f'(x)$ при $f(x)\neq 0$. В точке $f(x)=0$ производная может не существовать (угловая точка). Часто проще: раскрой модуль на промежутках знакопостоянства $f(x)$.
