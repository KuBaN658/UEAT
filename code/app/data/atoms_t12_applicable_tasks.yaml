- id: t12_mm37
  title: Экстремумы логарифмических функций
  text: |-
    Для $f(x)=\ln x - ax$: $f'(x)=\frac{1}{x}-a=\frac{1-ax}{x}$. Критическая точка: $x=\frac{1}{a}$ (при $a>0$). Проверь ОДЗ: $x>0$. На отрезке: не забудь концы, и что $\ln x$ определён только при $x>0$.
