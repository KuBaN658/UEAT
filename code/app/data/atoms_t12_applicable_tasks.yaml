- id: t12_mm07
  title: Чтение графика $f'(x)$ для нахождения экстремумов $f(x)$
  text: |-
    Дан график $f'(x)$: $f'(x)>0$ → $f$ возрастает; $f'(x)<0$ → $f$ убывает. Точка максимума $f$: $f'$ меняет знак с $+$ на $-$ (пересекает ось $x$ сверху вниз). Точка минимума: $f'$ меняет знак с $-$ на $+$. Если $f'$ касается $x$-оси, но не меняет знак — нет экстремума.
