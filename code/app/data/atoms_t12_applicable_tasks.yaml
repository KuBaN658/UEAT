- id: t12_mm32
  title: Сложная оптимизация произведений
  text: |-
    Для функций вида $x^a(b-x)^c$: $f'(x) = x^{a-1}(b-x)^{c-1}[a(b-x) - cx]$. Критическая точка (кроме $x=0$ и $x=b$): $a(b-x)=cx$ → $x=\frac{ab}{a+c}$. Этот приём часто встречается в задачах на оптимизацию.
  task_number: 12
