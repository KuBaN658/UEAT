- id: t12_mm24
  title: Критические точки дробных функций
  text: |-
    $\frac{f'g - fg'}{g^2} = 0$ ⟺ $f'g - fg' = 0$ (при $g \neq 0$). Часто удобнее: $\frac{f'}{f} = \frac{g'}{g}$ (логарифмическая производная). Пример: $\frac{x^2+1}{x}$ → $\frac{2x \cdot x - (x^2+1)}{x^2} = \frac{x^2-1}{x^2} = 0$ → $x = \pm 1$.
