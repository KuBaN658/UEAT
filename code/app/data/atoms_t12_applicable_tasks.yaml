- id: t12_mm25
  title: Сложная оптимизация дробных функций
  text: |-
    Функции вида $\frac{ax^2+bx+c}{dx+e}$ или $\frac{P(x)}{Q(x)}$: после дифференцирования числитель $f'g-fg'$ может быть многочленом высокой степени. Ищи корни: деление столбиком, группировка, подбор рациональных корней.
