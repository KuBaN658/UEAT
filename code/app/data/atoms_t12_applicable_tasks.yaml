- id: t12_mm36
  title: Производная логарифмической функции $\ln x$, $\log_a x$
  text: |-
    $(\ln x)' = \frac{1}{x}$ (при $x>0$). $(\log_a x)' = \frac{1}{x \ln a}$. Цепное правило: $(\ln g(x))' = \frac{g'(x)}{g(x)}$ (при $g(x)>0$). ОДЗ: аргумент логарифма строго положительный!
