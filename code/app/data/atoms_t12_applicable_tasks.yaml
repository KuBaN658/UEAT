- id: t12_mm02
  title: Сравнение значений функции по графику
  text: |-
    Чтобы сравнить $f(a)$ и $f(b)$: найди точки на графике и сравни высоты. Если нужно наибольшее/наименьшее — сравни все экстремумы и концы отрезка. Ответ — значение $f$ (а не $x$!), если спрашивают «наибольшее значение».
