- id: t12_mm01
  title: Анализ графика функции без производной
  text: |-
    По графику $f(x)$ можно определить наибольшее/наименьшее значение визуально. Максимум — вершина «горки», минимум — дно «ямки». На отрезке $[a,b]$ нужно также проверить значения на концах: $f(a)$ и $f(b)$.
