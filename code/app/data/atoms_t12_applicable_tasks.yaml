- id: t12_mm30
  title: Критические точки произведения функций
  text: |-
    $(fg)' = f'g + fg' = 0$. Вынеси общий множитель: если $f(x)=x^n \cdot h(x)$, то $f'(x) = x^{n-1}(n \cdot h(x) + x \cdot h'(x))$. Корни: $x=0$ (если $n>1$, проверь кратность!) и корни выражения в скобках.
