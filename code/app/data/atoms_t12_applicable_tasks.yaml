- id: t12_mm26
  title: Учёт области определения для дробных функций
  text: |-
    ОДЗ: $g(x) \neq 0$. Если $g(x_0)=0$ — точка не входит в область определения. Вблизи таких точек функция может стремиться к $\pm\infty$ (вертикальная асимптота). При поиске min/max на отрезке: если точка разрыва внутри $[a,b]$, задача нуждается в доп. анализе.
