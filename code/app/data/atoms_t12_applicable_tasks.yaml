- id: t12_mm43
  title: Экстремумы композиции тригонометрических функций
  text: |-
    Для $f(x)=\sin(g(x))$: $f'(x) = g'(x)\cos(g(x))=0$ → $g'(x)=0$ или $g(x)=\frac{\pi}{2}+\pi n$. Пример: $\sin(x^2)$: $f'(x)=2x\cos(x^2)=0$ → $x=0$ или $x^2=\frac{\pi}{2}+\pi n$. Отбирай корни с учётом отрезка и ОДЗ.
