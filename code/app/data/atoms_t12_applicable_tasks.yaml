- id: t12_mm29
  title: Экстремумы произведения на отрезке
  text: |-
    Стандартный алгоритм: найди $f'(x)=0$, оставь корни в $[a,b]$, сравни значения. Для $f(x)=x(x-1)(x+2)$ на $[-3,2]$: раскрой или дифференцируй по правилу произведения. Не забудь концы отрезка!
