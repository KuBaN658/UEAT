- id: t12_mm27
  title: Правило дифференцирования произведения $f \cdot g$
  text: |-
    $(fg)' = f'g + fg'$. Для трёх множителей: $(fgh)' = f'gh + fg'h + fgh'$. Запомни: каждый множитель по очереди дифференцируется, остальные остаются. Частая ошибка: забыть второе слагаемое.
