- id: t12_mm05
  title: Касательная и её угловой коэффициент
  text: |-
    Касательная к графику $f$ в точке $x_0$: $y = f(x_0) + f'(x_0)(x-x_0)$. Угловой коэффициент касательной $= f'(x_0)$. Если касательная горизонтальна → $f'(x_0)=0$ → это точка экстремума (или перегиба).
