- id: t12_mm38
  title: Комбинированные экспоненциально-логарифмические функции
  text: |-
    Для $f(x) = e^x \ln x$: $(e^x \ln x)' = e^x \ln x + \frac{e^x}{x} = e^x(\ln x + \frac{1}{x})$. Для $f(x)=x^x = e^{x \ln x}$: $f'(x) = x^x(\ln x + 1)$. Ключ: преобразуй к экспоненте через $e^{\ln}$ и применяй цепное правило.
