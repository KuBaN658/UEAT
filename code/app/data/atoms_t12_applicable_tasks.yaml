  title: Экстремумы многочленов степени 4+
  text: |-
    У $f(x) = x^4 - 4x^3$ три критические точки? $f'(x)=4x^3-12x^2=4x^2(x-3)$. Корни: $x=0$ (кратный) и $x=3$. При $x=0$ знак $f'$ НЕ меняется (нет экстремума). При $x=3$ знак меняется с $-$ на $+$ → минимум.
