  text: |-
    Пример: $f(x) = x - 2\sqrt{x}$ на $[0, 9]$. $f'(x) = 1 - \frac{1}{\sqrt{x}}$. $f'(x) = 0 \Rightarrow \sqrt{x}=1 \Rightarrow x=1$. Сравни $f(0)=0$, $f(1)=-1$, $f(9)=3$. Ответ: min $=-1$, max $=3$.
