- id: t12_mm28
  title: 'Производная произведения: применение'
  text: |-
    Для $f(x)=x^2(x-3)$: $f'(x)=2x(x-3)+x^2 = x(2(x-3)+x) = x(3x-6) = 3x(x-2)$. Альтернатива: раскрой скобки ($x^3-3x^2$) и дифференцируй. Для сложных произведений раскрытие не всегда удобно — используй правило.
