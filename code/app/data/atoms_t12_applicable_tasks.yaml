- id: t12_mm06
  title: Геометрический смысл производной
  text: |-
    $f'(x_0)$ = тангенс угла наклона касательной к оси $x$. По графику: $f'(x_0) = \tan\alpha$, где $\alpha$ — угол между касательной и положительным направлением $Ox$. Если $f'(x_0) > 0$ — функция возрастает, $f'(x_0) < 0$ — убывает.
