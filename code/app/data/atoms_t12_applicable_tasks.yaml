- id: t12_mm42
  title: Критические точки тригонометрических функций
  text: |-
    Для $f(x) = a\sin x + b\cos x$: $f'(x) = a\cos x - b\sin x = 0$ → $\tan x = \frac{a}{b}$. Бесконечно много критических точек! На отрезке: отбирай корни в $[a,b]$. Для $f(x)=\sin^2 x$: $f'(x)=2\sin x \cos x = \sin 2x = 0$ → $x = \frac{\pi n}{2}$.
  task_number: 12
  subtypes:
