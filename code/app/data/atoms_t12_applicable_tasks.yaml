- id: t12_mm35
  title: Экстремумы показательных функций
  text: |-
    Для $f(x)=g(x) \cdot e^{h(x)}$: $f'(x) = [g'(x)+g(x)h'(x)]e^{h(x)}$. Т.к. $e^{h(x)}>0$: критические точки из $g'(x)+g(x)h'(x)=0$. Пример: $(x-1)e^x$ → $f'(x)=e^x + (x-1)e^x = xe^x$, min в $x=0$.
