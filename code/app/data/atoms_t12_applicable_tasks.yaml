- id: t12_mm04
  title: Количество экстремумов и нулей по графику
  text: |-
    Количество точек максимума = количество «горок». Минимума = количество «ямок». Нули функции = пересечения с осью $x$. На отрезке $[a,b]$ считай только те экстремумы, которые попадают внутрь.
