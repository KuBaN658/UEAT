- id: t12_mm33
  title: Произведение с полиномиальными множителями
  text: |-
    Для $f(x)=(x-a)(x-b)g(x)$: производная содержит много слагаемых. Стратегия: раскрой $(x-a)(x-b) = x^2-(a+b)x+ab$ и умножь на $g(x)$, потом дифференцируй обычным способом. Или используй логарифмическую производную.
