- id: t12_mm45
  title: Сложные тригонометрические экстремумы
  text: |-
    Для $f(x) = \sin x + \cos x$: $f'(x) = \cos x - \sin x = 0$ → $\tan x = 1$ → $x = \frac{\pi}{4}+\pi n$. Или приведи к одной функции: $\sin x + \cos x = \sqrt{2}\sin(x+\frac{\pi}{4})$. Тогда max $= \sqrt{2}$, min $= -\sqrt{2}$.
  task_number: 12
