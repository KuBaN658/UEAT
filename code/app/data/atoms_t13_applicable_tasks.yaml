- id: t13_mm19
  title: Уравнение a sin x + b cos x = c
  text: 'Два пути: (1) формула вспомогательного аргумента $R\sin(x+\varphi)=c$ — далее простейшее по $\sin$; (2) приведение к однородному: $c=c(\sin^2(x/2)+\cos^2(x/2))$, после чего получаем квадратное по $\tg(x/2)$. Условие разрешимости: $|c|\le\sqrt{a^2+b^2}$.

