  text: '$\sin(\alpha\pm\beta)=\sin\alpha\cos\beta\pm\cos\alpha\sin\beta$. $\cos(\alpha\pm\beta)=\cos\alpha\cos\beta\mp\sin\alpha\sin\beta$ (знак противоположен). Часто разворачивают $\sin(x+\pi/4)$ или $\cos(x-\pi/3)$, чтобы привести к стандартной форме.

