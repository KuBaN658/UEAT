- id: t13_mm31
  title: Отбор по каждой серии независимо
  text: 'Если у уравнения $m$ серий корней, то двойное неравенство решается ОТДЕЛЬНО для каждой серии. Нельзя «слить» серии и решить одно неравенство — потеряешь часть корней или возьмёшь чужие. Запиши все серии, обведи каждую и отбирай по очереди.

    '
