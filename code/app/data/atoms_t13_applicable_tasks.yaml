- id: t13_mm07
  title: Формулы приведения
  text: 'Правило: при сдвиге на $\pi$ или $2\pi$ функция не меняется (только знак), при сдвиге на $\pi/2$ или $3\pi/2$ — меняется на конфункцию. Знак — по четверти исходного угла. Примеры: $\cos(\pi+x)=-\cos x$, $\sin(\pi/2-x)=\cos x$, $\sin(\pi-x)=\sin x$, $\cos(\pi/2-x)=\sin x$.

    '
