  text: 'В $\log_a f(x)$ требование $f(x)>0$ ограничивает область корней. Например, $\log_2(\sin x)$ — нужен $\sin x>0$, то есть $x\in(2\pi k;\pi+2\pi k)$. Это сразу отбрасывает половину тригонометрических корней.

