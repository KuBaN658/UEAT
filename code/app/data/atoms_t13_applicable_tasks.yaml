- id: t13_mm38
  title: Когда серий много — единичная окружность быстрее
  text: 'Если серий 3 и более (например, при факторизации на 3 множителя), отбор двойным неравенством занимает много места. Тогда удобнее круг: расставь все точки сразу и пройди по дуге. Если серия одна-две — двойное неравенство быстрее и формальнее.

    '
