- id: t13_mm16
  title: Сведение к квадратному по одной функции
  text: 'Если в уравнении встречается одна тригофункция (или $\sin^2,\cos^2$ через тождество $\sin^2+\cos^2=1$), сделай замену $t=f(x)$, где $f\in\{\sin,\cos,\tg,\ctg\}$. Получишь $at^2+bt+c=0$. Проверь, что найденные $t$ лежат в области значений: $|t|\le 1$ для $\sin,\cos$.

