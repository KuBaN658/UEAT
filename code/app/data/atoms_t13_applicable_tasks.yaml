- id: t13_mm02
  title: Табличные значения и знаки по четвертям
  text: 'Запомни значения $\sin/\cos/\tg$ для $0,\ \pi/6,\ \pi/4,\ \pi/3,\ \pi/2$. Знаки: I — все плюс; II — $\sin>0$, остальные $<0$; III — $\tg,\ctg>0$, $\sin,\cos<0$; IV — $\cos>0$, остальные $<0$. Без табличных значений невозможно записать $\arcsin(\sqrt{3}/2)=\pi/3$ и т.п.

    '
