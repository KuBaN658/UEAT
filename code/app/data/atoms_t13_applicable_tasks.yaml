  title: Замена в показательно-тригонометрическом уравнении
  text: 'Уравнения вида $a^{2\sin x}+a^{\sin x}+c=0$ или $a\cdot b^{\sin x}+\dots=0$: замена $t=a^{\sin x}>0$. Решаем $At^2+Bt+C=0$, отбрасываем $t\le 0$. Затем по найденному $t$ переходим к простейшему $\sin x=\log_a t$.

