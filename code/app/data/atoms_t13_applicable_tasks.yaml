- id: t13_mm01
  title: Основные тригонометрические тождества
  text: 'Базовые тождества: $\sin^2 x + \cos^2 x = 1$, $\tg x = \sin x/\cos x$, $\ctg x = \cos x/\sin x$, $\tg x \cdot \ctg x = 1$. Секанс-формы: $1 + \tg^2 x = \frac{1}{\cos^2 x}$, $1 + \ctg^2 x = \frac{1}{\sin^2 x}$. Используются для замены одной функции через другую, чтобы свести уравнение к одному типу.

    '
  task_number: 13
