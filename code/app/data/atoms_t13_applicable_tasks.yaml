- id: t13_mm03
  title: Простейшее уравнение sin x = a
  text: 'При $|a|\le 1$: $x=(-1)^n\arcsin a + \pi n$, $n\in\mathbb{Z}$, или две серии $x=\arcsin a + 2\pi k$ и $x=\pi-\arcsin a + 2\pi k$. При $|a|>1$ корней нет. Частные случаи: $\sin x=0\Rightarrow x=\pi n$; $\sin x=1\Rightarrow x=\pi/2+2\pi n$; $\sin x=-1\Rightarrow x=-\pi/2+2\pi n$.

    '
