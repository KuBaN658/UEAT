- id: t13_mm33
  title: Перебор k с проверкой выхода за границу
  text: 'После двойного неравенства явно перечисли подходящие $k$ и подставь в формулу серии. Чтобы обосновать, что других корней нет, выпиши также соседние $k$ (на 1 меньше минимального и на 1 больше максимального) и покажи, что они дают значения вне отрезка.

    '
