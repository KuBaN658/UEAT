  text: '$\tg x=a$ всегда разрешимо: $x=\arctg a + \pi n$, $n\in\mathbb{Z}$, ОДЗ $\cos x\ne 0$. $\ctg x=a$: $x=\arcctg a + \pi n$, ОДЗ $\sin x\ne 0$. Если в исходном уравнении нет $\tg/\ctg$, появление $\cos x=0$ или $\sin x=0$ как корня после деления — отдельный риск.

