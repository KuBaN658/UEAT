- id: t13_mm28
  title: Объединение и расщепление серий корней
  text: 'Серии $x=\frac{\pi}{2}+2\pi k$ и $x=-\frac{\pi}{2}+2\pi k$ объединяются в $x=\frac{\pi}{2}+\pi k$. Серия $x=\frac{\pi n}{3}$ расщепляется на 3 серии шагом $2\pi$ со сдвигами $0,\frac{\pi}{3},\frac{2\pi}{3}$ (для каждой из трёх — ещё дополнительные при шаге $\pi/3$). Объединять — для краткости, расщеплять — для отбора.

    '
