- id: t13_mm36
  title: Метод оценки и мажорирования
  text: 'Если $\sin\alpha+\sin\beta=2$ или $|f(x)|+|g(x)|=0$: сводится к системе равенств экстремумов. Например, $\sin\alpha+\sin\beta=2\Leftrightarrow \sin\alpha=\sin\beta=1$. Используется, когда стандартные приёмы не работают и в уравнении есть «подозрительные» сильные ограничения.

    '
