- id: t13_mm35
  title: Учёт ОДЗ при отборе корней
  text: 'Перед отбором обязательно отбрось корни, нарушающие ОДЗ исходного уравнения (знаменатель $=0$, аргумент логарифма $\le 0$, $\cos x=0$ для $\tg x$). Только потом — отбор по отрезку. Иначе можешь включить в ответ корень, который вообще не корень.

    '
