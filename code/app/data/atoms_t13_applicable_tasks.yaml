  text: 'Если в уравнении встречаются разные углы ($x$, $2x$, $x+\pi/3$): сначала формулы приведения и двойного угла приводят всё к одному углу $x$. Потом — стандартные методы. Типичная цепочка: $\sin 2x \to 2\sin x\cos x$, далее факторизация.

