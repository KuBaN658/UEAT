- id: t13_mm34
  title: Графический способ отбора корней
  text: 'На оси $Ox$ отметь концы отрезка и шаги периода серии (например, через $\pi$ или $2\pi$). Корни — равноотстоящие точки в каждой серии. Пересечение с отрезком — нужные корни. Метод нагляден для коротких отрезков ($1{-}2$ периода).

    '
