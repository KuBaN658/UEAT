  title: Замена в логарифмо-тригонометрическом уравнении
  text: 'Уравнения вида $\log_a^2(\sin x)+B\log_a(\sin x)+C=0$: замена $t=\log_a(\sin x)$ при ОДЗ $\sin x>0$. Решаем квадратное по $t$, затем $\log_a(\sin x)=t_i\Rightarrow \sin x=a^{t_i}$, проверяем $\sin x\in(0;1]$.

