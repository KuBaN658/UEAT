- id: t13_mm37
  title: Алгоритм решения 13-й задачи
  text: '(1) Определи тип уравнения и ОДЗ. (2) Приведи к одному углу/одной функции (формулы приведения, двойного угла, тождества). (3) Реши: замена / факторизация / простейшее. (4) Проверь корни на ОДЗ. (5) Отбери корни на отрезке (круг или двойное неравенство). (6) Запиши ответ для каждого пункта а) и б).

    '
