- id: t13_mm06
  title: Чётность, нечётность и сдвиги тригофункций
  text: '$\sin(-x)=-\sin x$, $\cos(-x)=\cos x$, $\tg(-x)=-\tg x$. Сдвиги: $\sin(x+2\pi k)=\sin x$, $\cos(x+2\pi k)=\cos x$, $\tg(x+\pi k)=\tg x$. Перед уравнением полезно использовать чётность, чтобы убрать минусы внутри функций (например $\sin(-x)=-\sin x$).

    '
