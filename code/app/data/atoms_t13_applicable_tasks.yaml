- id: t13_mm32
  title: Включение и исключение концов отрезка
  text: '«Корни на отрезке $[a;b]$» — оба конца включены. «На интервале $(a;b)$» — оба исключены. «Полуинтервал $[a;b)$» — левый включён, правый нет. Подставь $a$ и $b$ в формулу серии: если получается целое $k$, корень есть, и его судьба зависит от типа промежутка.

    '
