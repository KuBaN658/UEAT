  title: Однородное уравнение первой степени
  text: 'Вид $a\sin x + b\cos x=0$. Делим на $\cos x$: $a\tg x+b=0$ → $\tg x=-b/a$. Деление законно: $\cos x=0$ не корень (тогда $\sin x=\pm 1\ne 0$, противоречие). Решение: $x=\arctg(-b/a)+\pi n$.

