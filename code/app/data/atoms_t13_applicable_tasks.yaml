- id: t13_mm04
  title: Простейшее уравнение cos x = a
  text: 'При $|a|\le 1$: $x=\pm\arccos a + 2\pi n$, $n\in\mathbb{Z}$. При $|a|>1$ корней нет. Частные случаи: $\cos x=0\Rightarrow x=\pi/2+\pi n$; $\cos x=1\Rightarrow x=2\pi n$; $\cos x=-1\Rightarrow x=\pi+2\pi n$. Свойство: $\arccos(-a)=\pi-\arccos a$.

    '
