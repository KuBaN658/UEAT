- id: t13_mm08
  title: Формулы двойного угла
  text: '$\sin 2x = 2\sin x\cos x$. $\cos 2x$ — три формы: $\cos^2 x-\sin^2 x = 2\cos^2 x-1 = 1-2\sin^2 x$. $\tg 2x=\frac{2\tg x}{1-\tg^2 x}$. Выбор формы $\cos 2x$ зависит от того, какую функцию хочешь оставить в уравнении.

    '
