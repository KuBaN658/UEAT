name: Build LaTeX Documentation

on:
  pull_request:
    paths:
      - 'doc/src/**/*.tex'
      - 'doc/**/*.bib'
      - 'doc/src/vkr/graphics/**'
      - 'doc/.latexmkrc'
      - '.github/workflows/build-latex.yml'
  push:
    branches:
      - main
    paths:
      - 'doc/src/**/*.tex'
      - 'doc/**/*.bib'
      - 'doc/src/vkr/graphics/**'
      - 'doc/.latexmkrc'
      - '.github/workflows/build-latex.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-latex-base texlive-latex-extra \
            texlive-fonts-recommended texlive-latex-recommended texlive-bibtex-extra \
            texlive-lang-cyrillic latexmk biber
      
      - name: Build PDF
        working-directory: doc
        run: |
          mkdir -p pdfs build build/vkr
          # Project plan: xelatex + bibtex (natbib), see doc/.latexmkrc
          cp bib/references.bib build/references.bib
          latexmk -pdfxe -outdir=build src/Project_Plan_and_Review.tex
          cp build/Project_Plan_and_Review.pdf pdfs/
          # VKR coursework: pdflatex + biber (biblatex); run from src/vkr so title_vkr and graphics resolve
          (cd src/vkr && latexmk -pdf -outdir=../../build/vkr coursework.tex)
          cp build/vkr/coursework.pdf pdfs/
      
      - name: Upload PDF artifact (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pdf-documentation
          path: doc/pdfs/*.pdf
          retention-days: 7
      
      - name: Comment PDF on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const workflowRunUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `## 📄 Built PDF Documentation\n\nPDF успешно собран! Скачать можно в [артефактах workflow run](${workflowRunUrl}).`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      
      - name: Commit PDF to main branch
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add doc/pdfs/
          git diff --staged --quiet || git commit -m "chore: rebuild PDF documentation [skip ci]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git push origin HEAD:main

