name: Build LaTeX documentation

on:
  pull_request:
    paths:
      - 'doc/src/**/*.tex'
      - 'doc/**/*.bib'
      - 'doc/src/vkr/graphics/**'
      - 'doc/.latexmkrc'
      - '.github/workflows/build-latex.yml'
  push:
    branches:
      - main
    paths:
      - 'doc/src/**/*.tex'
      - 'doc/**/*.bib'
      - 'doc/src/vkr/graphics/**'
      - 'doc/.latexmkrc'
      - '.github/workflows/build-latex.yml'
  workflow_dispatch:

concurrency:
  group: doc-pdfs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-latex-base texlive-latex-extra \
            texlive-fonts-recommended texlive-latex-recommended texlive-bibtex-extra \
            texlive-lang-cyrillic latexmk biber

      - name: Build PDF
        working-directory: doc
        run: |
          mkdir -p pdfs build build/vkr
          cp bib/references.bib build/references.bib
          latexmk -pdfxe -outdir=build src/Project_Plan_and_Review.tex
          cp build/Project_Plan_and_Review.pdf pdfs/
          (cd src/vkr && latexmk -pdf -outdir=../../build/vkr diplomawork.tex)
          cp build/vkr/diplomawork.pdf pdfs/

      - name: Upload PDF artifact (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pdf-latex
          path: doc/pdfs/*.pdf
          retention-days: 7

      - name: Comment PDF on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const workflowRunUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            const runResp = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: runId });
            const checkSuiteId = runResp.data.check_suite_id;

            const artifactsResp = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: runId,
              name: 'pdf-latex',
              per_page: 5,
            });
            const artifact = artifactsResp.data.artifacts[0];

            const artifactUrl =
              checkSuiteId && artifact?.id
                ? `https://github.com/${owner}/${repo}/suites/${checkSuiteId}/artifacts/${artifact.id}`
                : workflowRunUrl;

            const body = `## 📄 LaTeX PDF\n\nСборка LaTeX завершена. [Скачать PDF](${artifactUrl}) (архив ZIP: \`Project_Plan_and_Review.pdf\`, \`diplomawork.pdf\`).`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Commit PDF to main branch
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add doc/pdfs/
          git diff --staged --quiet || git commit -m "chore: rebuild LaTeX PDFs [skip ci]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git push origin HEAD:main
