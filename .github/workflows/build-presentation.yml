name: Build presentation PDF

on:
  pull_request:
    paths:
      - 'doc/presentation/**'
      - '.github/workflows/build-presentation.yml'
  push:
    branches:
      - main
    paths:
      - 'doc/presentation/**'
      - '.github/workflows/build-presentation.yml'
  workflow_dispatch:

concurrency:
  group: doc-pdfs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: doc/presentation/package-lock.json

      - name: Build presentation PDF
        working-directory: doc/presentation
        env:
          PDF_OUT: ../../docs/presentation.pdf
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run export:pdf

      - name: Upload PDF artifact (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pdf-presentation
          path: docs/presentation.pdf
          retention-days: 7

      - name: Commit PDF to main branch
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/presentation.pdf
          git diff --staged --quiet || git commit -m "chore: rebuild presentation PDF [skip ci]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git push origin HEAD:main
